name: Hermes Agent
version: "0.1.0"
slug: hermes_agent
description: Nous Research Hermes Agent - persistent orkestrator med hukommelse, cron og SSH-eksekvering
url: https://github.com/NousResearch/hermes-agent
arch:
  - amd64
init: false
host_network: true
startup: application
boot: auto
options:
  model_base_url: "http://192.168.1.10:8088/v1"
  model_name: "qwen3.6:35b-a3b"
  model_api_key: "local"
  ha_mcp_url: ""
  telegram_bot_token: ""
  telegram_allowed_users: ""
  ssh_host: "192.168.1.30"
  ssh_user: "hermes"
  ssh_port: 22
  ssh_cwd: "/home/hermes"
  tool_search: "on"
  log_level: "info"
schema:
  model_base_url: str
  model_name: str
  model_api_key: password
  ha_mcp_url: password
  telegram_bot_token: password?
  telegram_allowed_users: str?
  ssh_host: str
  ssh_user: str
  ssh_port: int
  ssh_cwd: str
  tool_search: list(on|auto|off)
  log_level: list(debug|info|warning|error)
